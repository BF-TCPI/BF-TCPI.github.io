<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>战地6人格测试（200题）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { border-radius: 0 !important; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif !important; }
        body { background-color: #000000; color: #FFFFFF; overflow-x: hidden; }
        .option-input:checked + .option-label {
    background: transparent;
    border: 1px solid transparent;
    border-image: linear-gradient(
        90deg,
        #ff4500,
        #666,
        #00ff88
    ) 1;
    transition: all 0.2s ease;
}

.option-input:checked + .option-label {
    border-image: linear-gradient(
        90deg,
        #ff4500,
        #ffffff,
        #00ff88
    ) 1;
    color: white;
}
.option-grid-wrapper {
    background: linear-gradient(
        90deg,
        rgba(255,69,0,0.15),
        rgba(255,255,255,0.05),
        rgba(0,255,136,0.15)
    );
    padding: 20px;
}
        .result-bar { transition: width 1.5s cubic-bezier(0, 0, 0, 1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #111; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #FF4500; }
        .class-bg-gradient { background: linear-gradient(to top, #111 0%, transparent 100%); }

        .option-label {
    background: linear-gradient(
        90deg,
        #0b0b0b,
        #111,
        #0c0c0c
    );
    border: 1px solid transparent;
    transition: all 0.2s ease;
}

/* 选中状态 */
.option-input:checked + .option-label {
    background: linear-gradient(
        90deg,
        #151515,
        #1f1f1f,
        #151515
    );
    border: 1px solid #ff4500;
    color: #fff;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset;
}

/* hover 轻微提亮 */
.option-label:hover {
    background: linear-gradient(
        90deg,
        #101010,
        #1a1a1a,
        #101010
    );
}
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed top-0 w-full bg-black border-b border-zinc-800 z-50">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-[#FF4500] flex items-center justify-center text-black font-black italic">BF</div>
                <h1 class="font-bold text-lg tracking-tighter uppercase">Battlefield 6 Personality Profile</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="randomFillAndSubmit()" class="hidden sm:block text-[10px] border border-[#FF4500] text-[#FF4500] px-2 py-1 hover:bg-[#FF4500] hover:text-black transition-colors font-bold uppercase">
                    随机填充 (调试)
                </button>
                <div class="hidden sm:block text-right">
                    <p id="progress-text" class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Progress 0%</p>
                    <div class="w-40 h-1 bg-zinc-800 mt-1 overflow-hidden">
                        <div id="progress-bar" class="h-full bg-[#FF4500] w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto pt-28 pb-20 px-4">
        <div class="mb-10 p-6 bg-[#111] border-l-4 border-[#FF4500]">
            <h2 class="text-[#FF4500] font-bold mb-2 flex items-center gap-2 uppercase tracking-widest text-sm">
                TCAM Assessment System / 核心人格评估体系
            </h2>
            <p class="text-xs text-zinc-400 leading-relaxed uppercase">
                基于四维向量 $P = (T, C, A, M)$ 建模。评估结果将在答题完毕后生成<br>
                <span class="text-white font-bold">1 (完全不同意) — 5 (完全同意)</span>
            </p>
        </div>

        <form id="quiz-form" class="space-y-2">
            <div id="questions-list" class="grid grid-cols-1 gap-1"></div>
            <div class="mt-16 text-center">
                <button type="button" id="submit-btn" onclick="processResults()"
                    class="bg-[#FF4500] hover:bg-[#E63E00] text-black font-black px-12 py-5 uppercase tracking-widest transition-colors active:scale-95">
                    Execute Diagnosis / 执行诊断报告
                </button>
            </div>
        </form>
    </main>

    <div id="result-overlay" class="fixed inset-0 bg-black/98 z-[100] hidden items-center justify-center p-0 sm:p-4">
        <div class="bg-[#111] border border-zinc-800 w-full max-w-4xl shadow-2xl flex flex-col h-full sm:h-auto max-h-[100vh] sm:max-h-[95vh]">
            <div class="p-6 border-b border-zinc-800 flex justify-between items-center bg-black">
                <div>
                    <h2 class="text-2xl font-black text-white italic tracking-tighter uppercase">Operator Dossier</h2>
                    <p class="text-[10px] text-[#FF4500] font-bold tracking-[0.3em] uppercase">Intelligence Agency Evaluation</p>
                </div>
                <button onclick="closeResult()" class="text-zinc-500 hover:text-[#FF4500] transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto custom-scrollbar" id="result-body"></div>

            <div class="p-6 bg-black border-t border-zinc-800 grid grid-cols-2 gap-4">
                <button onclick="window.print()" class="py-4 border border-zinc-700 font-bold hover:bg-zinc-900 transition uppercase text-xs tracking-widest">保存档案</button>
                <button onclick="closeResult()" class="py-4 bg-[#FF4500] text-black font-bold hover:bg-[#E63E00] transition uppercase text-xs tracking-widest">重新评估</button>
            </div>
        </div>
    </div>

    <script>
const rawQuestions = [
    // 第一组：战术指挥与大局观 (Strategy & Tactics)
    "我会提前规划路线：在部署前观察地图，规划避开敌方载具火线、利用地形掩护进点的路径",
    "我会观察敌人分布：利用Q标记或侦察兵无人机，确认敌方大部队在旗点周边的驻守情况",
    "我分析失败原因：阵亡后会思考是由于枪法失误、位置暴露，还是被敌方侧翼包抄导致",
    "我调整打法：如果正面久攻不下，我会切换兵种或改变切入角度，尝试绕后破局",
    "我关注地图：时刻留意右上角小地图的红点、队友死亡标记及旗点占领进度的实时变化",
    "我记忆刷新点：熟知地图上重型载具、载具的具体刷新时间",
    "我预测敌人：根据战线流动，预判敌方下一波进攻的战术",
    "我利用掩体：在推进过程中始终确保身边有掩体，拒绝在开阔地带盲目奔跑",
    "我控制节奏：在进攻受阻时果断转入防守，等待队友集结后再进行下一波波次冲锋",
    "我避免无意义战斗：在偷偷占点时，即便路过未发现自己的敌军也会忍住不开火",
    "我选择最佳路线：优先利用地形优势确保以最低战损抵达目标区域",
    "我观察队友位置：时刻确认队友是否在身侧，确保自己不处于孤立无援的状态",
    "我分析武器：研究不同枪械在不同距离下的伤害衰减和配件组合，选择最适配当前地形的武装",
    "我判断风险：时刻评估是否有敌方狙击手埋伏等的可能性",
    "我重视策略：比起单纯的杀敌，我更倾向于通过占领关键枢纽来赢得胜利",
    "我优化行动：通过不断的对局总结，精简跑图路径，提高作战效率",
    "我关注全局：不仅盯着眼前的旗点，更会留意整个战场的资源配比和多点联动情况",
    "我避免冲动：面对诱饵敌军不盲目追击，防止跌入对方预设的交叉火力陷阱",
    "我会撤退：在载具血量过低或弹药告罄时，果断放弃阵地寻找掩护补给，保留生还战力",
    "我重视信息：积极处理语音指令和战场标记，认为情报的价值远高于单纯的操作",
    "我分析战局：通过观察双方票数扣除速度，判断当前应当转入全线龟缩还是破釜沉舟",
    "我判断时机：在敌方载具刚交完维修技能或正在换弹的空隙，发起致命一击",
    "我避免暴露：在潜入作战中尽量蹲伏移动，并利用烟雾弹遮挡敌方热成像仪的视线",
    "我寻找优势：习惯于抢占制高点或建筑转角，确保自己在交火瞬间占据地理主动权",
    "我控制资源：合理使用手雷、地雷及兵种技能，确保每一份资源都能产生战略收益",
    "我思考路径：在动态战场环境中，实时推演通往下一个目标点最安全、最高效的动线",
    "我观察变化：敏锐察觉烟雾等对战场视野及交火距离的影响",
    "我调整策略：若敌方空军压制过强，我会更换为防空兵种协同作战",
    "我避免重复错误：如果在同一窗口被击杀两次，第三次我绝不会再出现在那个位置",
    "我进行规划：在游戏开始前就明确本局的主要目标，是专注于载具猎杀还是据点防守",
    "我预测结果：在发起冲锋前，大致估算出敌我双方的兵力对比及己方的生还概率",
    "我使用战术：熟练运用钳形攻势、火力压制后绕后等经典战法与对手周旋",
    "我分析敌人: 观察敌方王牌玩家的活动规律，针对性地布置陷阱或进行反制",
    "我观察趋势：留意战场平衡点的倾斜，在己方阵线即将崩溃前预警并加固防线",
    "我避免盲目：不随波逐流在地图中心乱战，而是寻找能真正改变战局的关键点位",
    "我选择位置：始终寻找那些能够提供视野保护，且有逃生路线的射击位",
    "我关注细节：注意敌方地雷闪光、载具引擎声，捕捉任何潜藏的危机",
    "我判断局势：在混战中分清轻重缓急，优先处理威胁最大的载具或医疗兵",
    "我进行推演：脑内构思进攻方案，如果炸开这堵墙，内部的敌人分布可能会如何变动",
    "我优化决策：在多种救援方案或进攻路径中，快速选出收益最高、风险最受控的一项",
    "我分析环境：充分利用可破坏场景，通过轰塌建筑废墟来制造新的掩体或通路",
    "我规划行动：结合兵种特长，为自己设定阶段性的作战目标并有序执行",
    "我评估风险：分析强行救人或强占旗点的代价，不做无谓的自杀式换人",
    "我观察节奏：感受交火区域的推进速度，选择合宜的入场点以免落入敌阵中心",
    "我控制推进：带头或跟随大部队有序压前，而不是在空旷地带杂乱无章地乱冲",
    "我选择目标：优先压制对己方威胁最大的固定机枪位、狙击手或残血载具",
    "我调整位置：在击杀一名敌人后立刻转移，防止其队友根据死亡回放定位并反制",
    "我分析数据：通过战后结算的各项指标，客观评价自己在输出、协作和存活上的表现",
    "我优化路线：在熟悉的地图中总结出几条高效的“职业路径”，提高转场效率",
    "我保持理性：无论战况多焦灼，都能冷静判断局势而不被愤怒或挫败感左右判断",

    // 第二组：团队协作与支援 (Teamwork & Support)
    "我优先救队友：身为医疗兵时，首要任务是在确认安全后复活队友，维持阵线人数",
    "我配合行动：紧跟小队队长的节奏，确保小队成员在火力范围上能相互覆盖",
    "我提供资源：主动抛洒医药包或弹药箱，在交火间隙为前线队友恢复状态",
    "我听从指挥：严格执行小队长的标记指令，集中火力攻击指定目标或旗点",
    "我标记敌人：只要视野内出现敌踪，第一时间按下Q键标记，让全队共享视野",
    "我沟通信息：通过快捷语音或麦克风告知队友敌方坦克的方位或侧翼的威胁",
    "我团队优先：当个人击杀与占据旗点冲突时，我总是选择能增加团队分数的行动",
    "我支援队友：当看到队友被敌方火力压制时，我会主动提供火力遮断掩护其转移",
    "我协同推进：与载具保持同步，利用其重装防御作为掩护稳步压前",
    "我帮助队伍：在关键路口布置哨戒炮或信标，为团队提供持续的防御和重生点",
    "我共享信息：及时告知队友自己技能的冷却情况，以便团队筹划下一波战术行动",
    "我保护队友：在队友复活、换弹或维修载具时，主动负责周边的警戒任务",
    "我组织行动：利用标记系统引导散兵玩家向同一方向合力突破，形成局部优势",
    "我关注团队：时刻观察左下角的小队血条状态，确保核心输出位不因断奶而阵亡",
    "我避免单独行动：深知“独狼必死”的道理，总是寻求与路人或好友组队协作",
    "我协调配合：当小队缺少侦察或反坦克火力时，我会主动补位以平衡职业配置",
    "我重视团队：认为胜利的荣誉属于整个集体，而非个人战绩表上的杀敌数",
    "我帮助复活：即便不在安全区，也会在烟雾弹掩护下尝试营救陷入重围的战友",
    "我分配资源：在弹药匮乏时，优先将补给提供给输出位或关键的工程兵",
    "我参与沟通：积极响应战术讨论，对合理的进攻建议给予反馈并迅速行动",
    "我支持战术: 配合小队执行如“偷点”、“断后”等特定任务，不擅自脱队",
    "我保持配合：在占领旗点时主动分散站位，既能加速占点也能防止被手雷一窝端",
    "我协助防守：在己方据点受到攻击时，迅速通过部署系统回援，分担防守压力",
    "我参与推进：作为肉盾或掩护火力，为后排队友开辟出安全的输出空间",
    "我支持指挥：在小队长发布部署建议时，第一时间给予正面响应并落实",
    "我响应需求：当听到“我需要弹药/治疗”时，无论多远都会尝试靠近提供帮助",
    "我帮助补给：会补给队友，确保团队的持续运转",
    "我参与战斗：即便作为辅助位，也会在关键时刻倾泻火力协助前排击杀目标",
    "我保护后方: 注意背后或阴暗角落，防止敌方绕后小队摧毁己方的重生信标或设备等",
    "我团队导向：在选择技能配置时，优先考虑对团队群体增益大的功能性装备",
    "我协调节奏: 看到队友正在潜行时，我会配合其蹲伏移动，不发出响动打草惊蛇",
    "我关注整体：不仅看本小队，也会留意友军大部队的动向，查漏补缺填补防线空隙",
    "我帮助队友：看到队友被敌人追击，会主动开火拉仇恨，帮助其脱离险境",
    "我参与计划：在对局开始前的准备阶段，与队友商定好分工和切入点",
    "我支持行动：当队友发起大胆的突袭尝试时，给予全力的火力或物资支撑",
    "我促进合作：通过积极的战法示范和鼓励，引导路人玩家自发形成配合默契",
    "我减少冲突：不与队友争抢载具驾驶权，优先确保载具能发挥出最大作战效能",
    "我共享目标：全神贯注于当前小队锁定的战略目标，不被其他琐事干扰",
    "我增强团队：通过合理的技能卡组和道具搭配，全方位提升小队的持续战斗力",
    "我参与协作：在操作载具时，配合驾驶员的视角，提供火力输出",
    "我保持沟通：在遭遇战爆发时，第一时间报出敌人的人数、兵种和大概位置",
    "我帮助推进：利用投掷物等开路，为队友冲点争取窗口期",
    "我保护关键点：在己方狙击位或信标点附近留守，防止被敌方自由人单摸",
    "我参与支援：能够及时救援队友或在战斗区域外使用远程武器提供支援",
    "我关注队伍：确保自己始终处于能被队友救援或救援队友的范围之内",
    "我参与协调：在攻守转换的关键时刻，引导队友从进攻态势平滑转入防守布局",
    "我协助决策：为小队长提供侧翼敌情等信息参考，辅助其下达更正确的指令",
    "我支持团队：坚信集体的生存是个人得分的前提，始终贯彻团队利益至上",
    "我增强合作：利用兵种之间的合作实现高效击杀",
    "我优先团队：在牺牲自己能换取旗点占领的情况下，会毫不犹豫地冲进点内强行站桩",

    // 第三组：进攻性与压制力 (Aggression & Combat)
    "我主动进攻：面对缩头缩尾的敌人，我更倾向于带头冲进建筑清理威胁",
    "我喜欢冲锋：享受快节奏的白刃战，总是出现在交火最激烈的旗点前线",
    "我寻找击杀：狩猎敌方的弱点单位，如掉队的狙击手或无人看管的迫击炮手",
    "我快速推进：在清理完据点后不做停留，立刻奔向下一个敌方控制区进行压制",
    "我攻击敌人：保持高频的开火率，即使不能击杀也要通过压制效果让敌人视野模糊",
    "我进入战斗：渴望对抗，只要地图上哪里有交火，哪里就有我的身影",
    "我挑战敌人：面对敌方的高技术玩家或强大载具，有强烈的欲望将其彻底击毁",
    "我争取优势：通过频繁的滑铲、跳跃等机动手段，在近战对抗中寻找开火先机",

            "TCAR-C": "节奏指挥：你是战场的节拍器，擅长通过全局视角来引导团队的进攻潮流。你非常清楚什么时候该全线压上，什么时候该回缩防守。你的指令极具煽动性和逻辑性，能够让队友在混乱的混战中看清方向。你不仅关注击杀，更关注阵地的推进速度。你通过不断的信息共享和目标引导，让每个队员都明确自己的位置。你是那种能把乱战变成有序屠杀的指挥天才，通过对节奏的微操，你让胜利变得如同精密钟表运行般理独当然。",
            "TSAM-A": "精准突击：你是优雅的处刑者，将卓越的操作技巧与深思熟虑的射击时机结合。你反对一切形式的无脑冲锋，认为每一次扣动扳机都应是一次完美的战术执行。你的反应速度惊人，但更强大的是你对风险的评估。你擅长寻找侧翼，在敌人最意想不到的角度发动攻击，并利用极高的爆头率瞬间结束战斗。你代表了突击手的高级形态：冷静、高效且极具杀伤力。你是那种在阴影中快速闪烁，随后留下一地敌方残骸的战场专家。",
            "TSAM-S": "战术狙神：你是战场上的绝对耐心者，为了那一次完美的射击，你可以潜伏数分钟不发一弹。你的字典里没有「侥幸」，只有「确认击杀」。你对武器性能的掌握达到了极致，后坐力控制与提前量预算如同呼吸般自然。你习惯于从更高维度的空间去解读战局，通过清除对方的关键威胁（如对方狙击手或指挥官）来建立战术平衡。你不仅是射手，更是一位隐忍的战略棋手，每一次枪响都是对敌方心理和战线的沉重打击。",
            "TSAM-M": "后线医疗：你是团队的最后一道生命防线，极度稳健的性格让你总能在最安全的位置提供最持久的支援。你从不冒进，深知自己的存活直接关系到整个分队的生死。你建立的后勤站总是位于敌方视线的死角，既能快速接纳撤回的伤员，又能有效躲避空袭。你的这种「保守主义」在漫长的拉锯战中极其珍贵，通过降低整体风险，你让团队能够始终保持健康的人力配置。你是那种默默无闻，但战后数据统计中贡献度惊人的基石型成员。",
            "TSAM-E": "稳健工程：你对防御体系有着近乎强迫症的执着，擅长构建坚不可摧的据点防线。你更倾向于修复与加固，而非破坏与突击。在你的管理下，团队的载具始终维持在最佳状态，据点的防御塔和地雷阵布局合理、相互掩护。你的这种稳重给予了前线队员极大的心理安全感，因为他们知道无论外面的世界如何混乱，身后总有一个无法逾越的堡垒。你是一位现实主义的战场守护者，通过对细节的精益求精来对抗战场的无序感。",
            "TSAM-C": "战术观察者：你将信息视作比子弹更重要的资源，是那种能躲在后方仅凭标记和侦察就能改变战况的智将。你对地图资源的流向有着敏锐的洞察力，总能提前预警敌人的包抄意图。你话不多，但每一条语音频道里的信息都价值连城。你倾向于引导队友去执行最高效的任务，通过信息差来消磨敌方的抵抗意志。你是那种典型的隐形舵手，在你的指引下，队友总觉得自己似乎特别走运，殊不知所有的运气都是你精确计算的结果。",
            "TSAR-A": "稳健突击：你是阵地战的中流砥柱，推崇步步为营的推进哲学。你拒绝高风险的自杀式突击，转而追求持续且稳定的火力输出。你非常擅长寻找掩体，在推进过程中几乎不漏破绽。你的这种性格让你的存活率极高，能够在长时间的接火中持续压榨敌人的生存空间。你就像一台不可阻挡的压路机，虽然速度不快，但经过的每一个角落都会被彻底净化。你代表了战场上的稳定性，是那种能让指挥官放心托付重要据点的核心步兵。",
            "TSAR-S": "防守狙击：你是一座无法逾越的塔，将狙击步枪作为防御核心工具。你通常驻守在团队的侧翼或关键补给点，通过长程视线封锁大片区域。你的存在本身就是一种禁令，迫使敌方不得不投入数倍于你的力量来处理这个麻烦。你不需要华丽的瞬镜操作，你依靠的是完美的选位和对进场时机的把控。你享受保护的过程，看到敌人在你的准星威慑下畏首畏尾，是你最大的战术满足感。你是团队后方的守护神。",
            "TSAR-M": "安全医疗：你是一位极端冷静的战场医师，信奉「只有活着的医生才能救人」。在混乱的战场上，你总是第一个判断出局势的危险程度，并迅速指挥队友撤向掩护体。你对医疗资源的分配非常苛刻，只在最有利的时机进行最关键的干预。这种性格让你在极端压力下依然能保持理智，不会因为一两个冒进的队友而搭上整个分队的性命。虽然你看起来不够热血，但你带来的这种生存纪律是任何高难度任务完成的底线保障。",
            "TSAR-E": "防御工程：你是个迷恋工事的完美主义者，战场在你眼中就是一系列待加固的几何体。你擅长在最短时间内将一个普通房间改造为无懈可击的阵地。地雷的埋设位置、铁丝网的封堵角度、防爆门的加固顺序，你都经过严密的逻辑推导。你的这种防守倾向让团队在资源争夺战中立于不败之地。你甚至能利用地形制造出致命的漏斗效应，将敢于进攻的敌人引入陷阱。你是那种能让敌人在强攻失败后陷入绝望的战略守卫。",
            "TSAR-C": "后方指挥：你是幕后的操盘手，擅长在安全的指挥席上调动一切可用的远程资源。你更倾向于利用空中支援、炮火覆盖以及战略部署来瓦解敌人，而非亲自下场肉搏。你对各种战术技能的冷却时间了如指掌，总能在战线最关键的时刻提供那一份致命的额外火力。你的指挥风格沉稳且富有逻辑，通过不断的资源调度和远程干预，你让前线的战斗变得轻松。你是那种通过智力博弈赢得战争的现代将领，是整个战术体系的中央处理器。",
            "ICAM-A": "狂战突击：你代表了战场的原始狂热，是那种能用极高操作水平弥补进攻冲动的危险人物。你的信条是「最好的防御就是进攻」，在你的词典里没有撤退这个选项。你凭借惊人的反应速度和枪法直接撕碎眼前的所有阻碍，喜欢身处火线中心享受子弹擦过的快感。这种激进的策略往往能起到奇兵的效果，让敌方尚未部署完成就已溃不成军。你是那种能单枪匹马在敌阵中杀个七进七出的战争狂人，是敌人的噩梦，队友眼中的超级英雄。",
            "ICAM-S": "激进狙击：你彻底颠覆了狙击手的古板形象，是一个背着狙击步枪游走在死亡边缘的刺客。你拒绝长时间蹲守在同一个位置，而是通过不断的位移寻找最短距离的致命一击。你的瞬镜和切枪技巧炉火纯青，甚至敢于在近距离与突击手博弈。你的战斗风格极具侵略性，经常出现在敌后方或侧翼，通过快速的击杀制造混乱。这种高风险高收益的打法让你在战场上极具存在感，是一个能在极短时间内改写击杀榜的恐怖猎手。",
            "ICAM-M": "激进医疗：你是一位行走在刀尖上的医生，对于你来说，救治队友是一场与死神争分夺秒的竞速。你经常冒着猛烈的炮火强行拉起倒地的战友，甚至在救人的瞬间还能顺便反杀一个敌人。这种不顾一切的支援精神极大地鼓舞了团队的士气。你的这种冲动并非盲目，而是建立在对自己极高操作上限的自信之上。你认为每一次成功的急救都是对敌方努力的嘲弄，是战场上最热血的救世主，是那种能让整个分队为之热血沸腾的传奇人物。",
            "ICAM-E": "疯狂工程：你是个痴迷于爆破艺术和载具极速的危险天才，战场就是你的巨大实验室。你不仅擅长修理，更热衷于制造最大规模的混乱。你喜欢开着轻型载具冲入敌方阵地，在跳车的瞬间引爆炸药。你对爆炸物的运用已经到了出神入化的地步，无论是反载具还是拆楼，你总能搞出最大的动静。这种不按常理出牌的进攻方式让敌方防线无法预测。由于你的存在，战场上每一分钟都伴随着震耳欲聋的爆炸，你是那种用硝烟和碎片书写胜利的混乱制造者。",
            "ICAM-C": "战斗指挥：你是一位冲锋在最前线的将领，深信「跟我冲」比「给我冲」更有说服力。你一边在枪林弹雨中精准输出，一边通过对局势的直觉判断发出振奋人心的指令。你的指挥风格极具进攻色彩，擅长寻找敌方的阵型缺口并组织全线强突。由于你始终身处一线，你的决策往往带有一种紧迫的真实感和极强的感染力。你是团队的战神与大脑，通过身体力行的暴力美学，你引领着整个队伍走向那种充满血性的最终胜利。",
            "ICAR-A": "冲锋战士：你是最纯粹的进攻意志体现，这种人格只为突破而生。你不屑于复杂的战术推导，你更相信速度与暴力的叠加效应。在战斗中，你总是第一个跃出掩体，用密集的火力和无畏的冲锋压制敌方的反应空间。你的这种行为具有极强的示范效应，常能带动原本迟疑的队友发起波次进攻。虽然你的伤亡率可能不低，但你每一次成功的突破都是为后续团队占领据点铺平的血腥道路。你是阵地战中无法阻挡的铁锤。",
            "ICAR-S": "游走狙击：你是不可捉摸的战场游掠者，将狙击步枪玩成了短兵相接的利器。你拒绝固定站位，你的位置永远取决于下一个敌人的刷新点。你擅长在高速奔跑中急停开火，这种动态射击让传统的反器材打击变得极具侵略性。你更像是一个带着瞄准镜的突击兵，通过不断的侧翼绕后和精准的游猎来蚕食敌方的人员资源。你追求的是那种行云流水般的连续击杀，是那种让敌人在重生点刚出门就感到背后发凉的恐怖存在。",
            "ICAR-M": "前线医疗：你拒绝在后方安稳待命，你是前线那股红色暖流，始终贴着火线活动。你将医疗包当作进攻资源，通过不断的包扎和复活来维持团队的进攻压力不中断。你的枪法在医疗兵中也名列前茅，经常一边反击一边把队友拉回生死线。这种近距离的支援让你非常了解战斗的残酷程度，也培养了你极强的临场反应能力。你不仅是医生，更是团队进攻体系中不可或缺的韧性核心，是那种能在混战中保持推进节奏的关键角色。",
            "ICAR-E": "突击工程：你是一个极具攻击性的工兵，专注于快速摧毁敌方的防御核心。你对爆炸物的执念远超修复工具，你存在的意义就是把敌人的据点夷为平地。你擅长使用轻便的爆破器材在极短时间内炸开侧墙或摧毁掩体，为团队制造意想不到的切入口。在载具作战中，你也更倾向于高速突袭而非远程对轰。你的打法快、准、狠，极度暴力且富有观赏性。你是战场上的拆迁专家，用最直接的方式宣告敌方防御体系的彻底失效。",
            "ICAR-C": "临场指挥：你是一位信奉「直觉至上」的指挥者，擅长在瞬息万变的混战中抓住那一闪而逝的胜机。你不需要完美的计划，你的决策往往是在接火后的三秒内根据本能做出的。这种灵活性让你在面对突发状况时比那些刻板的将官反应快得多。你的指令往往简洁有力，能瞬间让分散的火力集中到同一个目标上。你是那种擅长乱中取胜的天才，在最激烈的据点混战中，你的直觉就是指引团队穿过死亡之谷的唯一灯塔。",
            "ISAM-A": "独狼突击：你是战场上的孤胆英雄，极度自信的操作让你认为多余的配合反而是一种拖累。你擅长单兵渗透，利用地图边缘和盲区切入敌方深层腹地。你的战斗风格是极致的高效与冷静，通过瞬间的爆发击杀目标后迅速消失在阴影中。你不需要支援，也不需要补给站，因为你坚信最好的防御就是让敌人在开火前就变成尸体。你是那种能在单局比赛中打出惊人KD比的顶级掠食者，一个能让对方整支分队因防备你一个人而变得束手无策的特种作战大师。",
            "ISAM-S": "独狼狙神：你是战场最深处的冷酷观察者，将「狙击」这一行为简化到了纯粹的杀戮。你不需要观察员，不需要队友保护，你的每一个动作都经过精密的计算。你依靠变态级别的反应和枪法，在任何距离都能完成瞬间狙杀。你的站位通常在常理之外，让敌人根本无法定位火力的来源。你这种孤傲的战斗风格让你成为了战场上的「不可控因素」，无论是据点防御还是反狙击，你都是那种单凭个人技巧就能撑起一个战术层面的异类。你是那种能让对方狙击手感到绝望的绝对顶峰。",
            "ISAM-M": "自给医疗：你是一位特殊的医疗兵，你更倾向于将医疗资源作为提升个人持续作战能力的工具。你拥有极高的生存技巧和防守意识，擅长在孤立无援的情况下利用医疗站和快速自愈功能消耗大量敌人。你的这种自给自足让你成为了一个极其难缠的目标。虽然你较少主动参与大规模团战，但你在侧翼或边缘区域的持久存在极大地分散了敌方的注意力。你是一个能把医疗职业玩成「永动突击兵」的高手，是那种在残局中能凭借血量优势笑到最后的生存达人。",
            "ISAM-E": "单兵爆破：你是一个游走在规则边缘的破坏分子，擅长利用地图资源和爆炸器材进行独立的战术干扰。你喜欢单人操作载具进行自杀式袭击，或者在敌方必经之路上埋设足以扭转战局的各种陷阱。你这种特立独行的风格让你的行动极具隐蔽性。你的目标通常不是杀人，而是瘫痪敌方的重型资源或据点设施。只要给你一点点漏洞，你就能把敌方的后勤线搞得鸡飞狗跳。你是那种哪怕全队都在坐冷凳，你一个人也能让敌方前线鸡犬不宁的独立专家。",
            "ISAM-C": "隐形指挥：你是一位深藏不露的意志影响者，你的指挥不通过语音，而通过你的行动。你擅长利用个人操作在局部战场打开局面，进而引导那些盲目的路人队友跟随你的节奏。你对战局的判断极准，总能出现在那个最能改变天平重量的位置。你的「指挥」就像是一种心理诱导，通过一次次成功的破点和标记，让潜意识里的战术协作得以实现。你是那种不居功、不显眼，但战局走向完全在你的预料之中的隐秘导师。你是战场无序状态下的有序内核。",
            "ISAR-A": "游走刺客：你是战场上的暗影，追求的是那种悄无声息的斩首行动。你对地图的犄角旮旯和垂直高度有着病态的利用率。你的战斗风格不是硬碰硬，而是绕后、切断、再绕后。你像是一根扎在敌方侧翼的刺，让对方不得不分兵处理，却又总能被你轻易脱离。这种极度敏捷的战术风格让你成为了战场上的骚扰大师，通过不断暗杀对方的关键人物，你让敌方的整体协同性在无声无息中崩溃。你是那种极度冷静、极度致命且极度难以捕捉的战场猎手。",
            "ISAR-S": "潜伏狙击：你是那种能把「伪装」玩成艺术的射手，在你的眼中，狙击是一场关于耐心的长期投资。你习惯于寻找地图边缘那些几乎没人会注意的缝隙，在那里构建一个微缩的致命空间。你从不连射，每一发子弹都追求必杀。你享受那种看着敌人在你的监视下毫无察觉走入陷阱的过程。由于你极少暴露，敌方往往只能通过倒下战友的尸体朝向来猜测你的大概方位。你是一位孤独的守望者，在无声的潜伏中收割着那些傲慢且鲁莽的灵魂。",
            "ISAR-M": "谨慎医疗：你是一位极端保守的战场后勤人员，对安全感有着近乎偏执的需求。你只会在确认绝对安全的情况下才伸出援手。你的战术行为更多是基于自保而非奉献。虽然这种作风在有些人看来不够勇敢，但它保证了医疗资源的绝对存活率。你擅长躲在厚实的墙壁后或坦克阴影下，等待伤员爬回你的安全区。你的存在像是一台稳定的加血机器，虽然缺乏爆发性的拯救，但这种细水长流的支援在持久战中也是一种不可忽视的防守力量。你是战场上的稳健幸存者。",
            "ISAR-E": "独立工程：你是一个痴迷于钢铁巨兽的独行侠，更倾向于独自操作一辆载具来接管局部战场。你对载具的每一个参数和每一种应对策略都了如指掌，即便没有队友的维修，你也能通过精准的走位和撤退时机维持战斗力。你喜欢在远距离利用坦克炮火或火箭炮进行精确打击，这种独立作战的能力让你成为了一个移动的火力点。对于你来说，队友只是战场背景板，你只相信你手中的操纵杆和瞄准器。你是那种能单人开着坦克改变一个战区胜负的载具王牌。",
            "ISAR-C": "节奏干扰：你是一个深谙心理战和战术干扰的大师，你的目标不是正面指挥，而是让敌方的指挥系统失灵。你擅长通过不断的侧翼骚扰、虚假目标诱导以及对补给线的破坏，让敌方的进攻节奏变得支离破碎。你就像是战争迷雾中的幽灵，通过制造各种战术噪音来干扰对方指挥官的判断。虽然你很少出现在战斗核心，但你的每一个小动作都在为己方主力创造优势空间。你是那种能通过「不作为」和「乱作为」让敌方陷入集体焦虑的战术鬼才。",
            "TCIM-A": "混合突击：你是一个理性与狂暴的矛盾体，擅长在冷静布局与热血冲锋之间进行瞬间转换。在大部时间内，你会像战术家一样严密观察战场，计算收益与风险。但一旦你锁定了胜机，你会瞬间释放出体内的原始侵略性，用最狂野的操作接管比赛。这种不可预见性是你的最大底牌，让敌人永远无法摸透你的战斗逻辑。你既能在阵地战中通过精准选位稳住阵脚，又能在僵局中发动一次赌上一切的疯狂突击。你是那种天生的终结者，拥有多种面孔的战场变色龙。",
            "TCIM-S": "混合狙击：你完美平衡了观察者的静谧与操作员的力量，是一个全天候的射击核心。你不仅拥有顶尖的定点狙击能力，更具备在近战中快速反应的操作。你不仅关注远处的红点，同样关注脚下的陷阱和侧翼的脚步。由于你兼顾了战术眼光和极佳的物理反馈，你能在最复杂的地形中找到那条射界最广、安全性最高的路径。你不会被狙击手的职业框架所限制，你是那种能在任何距离、任何光照条件下都保持极高致死率的混合型王牌射手。",
            "TCIM-M": "混合医疗：你是一位既理智又充满决断力的生命拯救者，擅长在极其复杂的风险评估中找到那条最优解。你深知何时该像普通士兵一样开火压制，何时该像神迹般出现在伤员身边。你的这种平衡感源于你对战场动态的深刻理解。你不会为了救一个必死之人而牺牲，也不会在队友急需支援时退缩。这种极度灵活的性格让你在任何队伍中都能迅速融入，成为连接前线进攻与后勤保障的黄金枢纽。你是那种能让队友在血量见红时依然感到希望的、充满智慧的守护者。",
            "TCIM-E": "混合工程：你将精密的计算与爆发性的破坏完美融合，是一个极度灵活的工程专家。你可以花十分钟布置一个精巧的防御阵地，也可以在十秒内开着载具冲破敌方的钢铁防线。你对资源的使用极其讲究效率，无论是修复一辆坦克还是炸掉一座桥，你都会在脑海中预演其对战局的影响。这种多样化的战术手段让你成为了战场上的瑞士军刀。无论现在的任务是防守据点还是开路突围，你都能拿出最合适的方案并完美执行。你是那种能让载具和工事都焕发第二生命的战术魔术师。",
            "TCIM-C": "混合指挥：你是一位极具适应力的多维统帅，能够根据对手的风格随时调整己方的指挥节奏。你既能制定严谨的长远作战计划，也能在遭遇战中下达极具赌徒色彩的激进指令。你的智慧建立在海量的实战经验和对自己操作的极度自信之上。由于你不仅懂得如何发令，更懂得如何亲自在战场上制造优势，你的指令往往能得到队友最彻底的执行。你是那种能把不同性格的队员揉合在一起，并引导他们打出超水平战果的战术大脑，是全局博弈的最高胜负手。",
            "ISIM-A": "极限突击：你是纯粹暴力的代名词，大脑中所有的神经元似乎都为反射神经和枪法控制而生。你的战斗不需要逻辑，不需要战术，你就是战术本身。通过超越常人的手速和对动态目标的捕捉，你在枪林弹雨中像是在进行一场华丽的死亡舞蹈。这种极度的个人英雄主义在绝境中往往能创造神迹，因为你根本不按常理出牌。只要你手中有一把枪，整个敌方分队在你的眼中也不过是一串等待收割的动态数据。你是那种能靠一人一枪就让对面整局自闭的极限武力体现。",
            "ISIM-S": "极限狙击：你追求的是那种物理极限上的精度，将狙击这一行为转化为了一种纯粹的生理反射。你对每一发子弹轨迹的控制已经达到了潜意识的程度。即便在最极端的条件下——烟雾缭绕、剧烈晃动、超远距离——你依然能保持惊人的爆头率。你不屑于团队的掩护，也不需要战术的铺垫，你相信极致的武力可以击碎一切虚伪的策略。你是那种能在地图最阴暗的角落里，用最不讲道理的枪法直接瓦解敌方指挥系统的极限杀手。你的存在就是对「公平」二字的最大挑战。",
            "ISIM-M": "极限医疗：你是一位在极端环境下诞生的救治魔术师，你的每一个复活动作都是在向死神公然挑衅。由于你拥有极高的反应速度和近战能力，你经常在敌方阵地中央强行救人并全身而退。这种极具视觉冲击力的操作不仅拯救了队友，更像是一记记耳光抽在敌方的脸上。你享受那种在极限压力下完成医疗任务的快感，这种对风险的极度追求让你成为了战场上最亮眼的焦点。你是那种能在满屏火力的空隙中闪转腾挪，并把队友从死亡边缘一次次拉回来的奇迹创造者。",
            "ISIM-E": "极限工程：你是一个痴迷于极限破坏和极限修复的狂人，战场就是你展现个人意志的角斗场。你擅长进行那些几乎是自杀式的高风险爆破，或者在重火力封锁下强行修复濒临爆炸的重型载具。你的操作精准且疯狂，往往能在零点几秒的偏差内挽救局势或摧毁目标。你这种不计后果的风格虽然不稳定，但一旦成功就能彻底改变整场战斗的走势。你是那种能开着冒烟的飞机撞向敌方指挥部，或者在据点陷落前最后一刻埋下核弹级炸弹的极限工兵。",
            "ISIM-C": "极限操盘：你是一个用极端个人行为来操纵全局的异类指挥。你不仅在脑中进行全局对抗，更在实操中用极高的个人武力去引导战况。你喜欢用一些极具风险的策略——比如全员突击、放弃老家、极速渗透——来逼迫敌方进入你预设的狂乱节奏。你的指挥就像是一场高空走钢丝，虽然险象环生，但由于你的个人能力足以补上所有的漏洞，团队总能在那万分之一的几率中赢得最终的辉煌。你是那种能把战争玩成极限运动的疯狂天才，是所有稳健派指挥官的噩梦。"
        };

        function render() {
            const list = document.getElementById('questions-list');
            list.innerHTML = rawQuestions.map((q, i) => {
                const id = i + 1;
                return `
                <div class="bg-[#111] border-l border-zinc-800 p-4 group transition-colors hover:bg-zinc-900" id="card-${id}">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[#FF4500] font-black text-[10px] tracking-tighter">NODE_${id.toString().padStart(3, '0')}</span>
                        <p class="text-[12px] font-bold text-zinc-300 ml-4 flex-1 uppercase tracking-tight">${q}</p>
                    </div>
                    <div class="option-grid-wrapper">
    <div class="grid grid-cols-5 gap-[1px]">
                        ${[1, 2, 3, 4, 5].map(v => {
    const hue = (v - 1) * 30; // 0~120

    return `

    <label class="cursor-pointer group">
        <input type="radio" name="q${id}" value="${v}" class="option-input hidden" onchange="updateProgress()">

        <div class="option-label py-1.5 text-center transition-all" style="
                background-color: hsl(${hue}, 85%, 45%);
                filter: saturate(1.1);
            ">

            <span class="text-[9px] font-bold text-white">${v}</span>
        </div>
    </label>`;
}).join('')}
                            </div>
</div>
                    </div>
                </div>`;

            }).join('');
        }

        function updateProgress() {
            const answered = new FormData(document.getElementById('quiz-form')).keys();
            const count = Array.from(answered).length;
            const percent = Math.round((count / 200) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').innerText = `Progress ${percent}%`;
        }

        function randomFillAndSubmit() {
            for(let i=1; i<=200; i++) {
                const options = document.getElementsByName('q'+i);
                options[Math.floor(Math.random()*5)].checked = true;
            }
            updateProgress();
            document.getElementById('submit-btn').scrollIntoView({ behavior: 'smooth' });
            setTimeout(processResults, 500);
        }

        function processResults() {
            const formData = new FormData(document.getElementById('quiz-form'));
            const data = Object.fromEntries(formData.entries());
            if (Object.keys(data).length < 200) { alert(`DATA INCOMPLETE: 评估未完成。`); return; }

            const rawScores = { T: 0, C: 0, A: 0, M: 0 };
            for(let i=1; i<=200; i++) {
                const val = parseInt(data['q'+i]);
                if(i <= 50) rawScores.T += val;
                else if(i <= 100) rawScores.C += val;
                else if(i <= 150) rawScores.A += val;
                else rawScores.M += val;
            }

            const avg = { T: rawScores.T / 50, C: rawScores.C / 50, A: rawScores.A / 50, M: rawScores.M / 50 };
            const f = (val, pos, neg) => val >= 3 ? pos : neg;
            const code = f(avg.T, 'T', 'I') + f(avg.C, 'C', 'S') + f(avg.A, 'A', 'I') + f(avg.M, 'M', 'R');

            const sortedTraits = Object.entries(avg).sort((a,b) => b[1] - a[1]);
            const topTrait = sortedTraits[0][0];

            let R = 'A';
            if (topTrait === 'T') R = avg.T > 4 ? 'C' : 'S';
            if (topTrait === 'C') R = 'M';
            if (topTrait === 'A') R = 'A';
            if (topTrait === 'M') R = 'E';

            let finalCode = `${code}-${R}`;
            if (avg.M > 4.5 && avg.C < 2.5 && avg.T < 2.5) finalCode = `ISIM-${R}`;
            else if (avg.T > 3.5 && avg.A < 2.5) finalCode = `TCIM-${R}`;

            if (!personalityMap[finalCode]) {
                const base = code.substring(0,4);
                finalCode = [`${base}-A`, `${base}-S`, `${base}-M`, `${base}-E`, `${base}-C` ].find(opt => personalityMap[opt]) || "TCAM-A";
            }

            displayReport(avg, finalCode, R);
        }

        function displayReport(avg, finalCode, R) {
            const body = document.getElementById('result-body');
            const description = personalityMap[finalCode];
            const bgImage = classImages[R] || classImages['A'];
            const className = classNames[R] || classNames['A'];

            body.innerHTML = `
                <div class="relative w-full h-80 sm:h-[450px] overflow-hidden">
                    <img src="${bgImage}" class="w-full h-full object-cover grayscale-[0.3] brightness-75 scale-105" alt="Class">
                    <div class="absolute inset-0 class-bg-gradient flex flex-col justify-end p-8">
                        <div class="bg-[#FF4500] text-black text-[10px] font-black px-2 py-1 w-fit mb-2 uppercase">Core Specialization</div>
                        <h4 class="text-3xl sm:text-5xl font-black italic tracking-tighter text-white uppercase">${className}</h4>
                        <div class="h-1 w-20 bg-[#FF4500] mt-2"></div>
                    </div>
                </div>

                <div class="p-8 space-y-12">
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-[#FF4500] tracking-[0.6em] mb-2 uppercase">Operator Identity Code</p>
                        <h3 class="text-6xl sm:text-8xl font-black text-white italic tracking-tighter mb-8">${finalCode}</h3>
                        <div class="max-w-2xl mx-auto border-y border-zinc-800 py-8 px-4">
                            <p class="text-zinc-200 text-sm sm:text-lg font-medium leading-relaxed text-justify italic">
                                "${description}"
                            </p>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-6">
                        ${Object.entries(avg).map(([key, val]) => {
                            const percent = Math.round((val / 5) * 100);
                            const label = {T:'TACTICAL', C:'COOP', A:'AGGRESSIVE', M:'TECHNICAL'}[key];
                            return `
                                <div>
                                    <p class="text-[9px] font-black text-zinc-500 tracking-widest mb-1 uppercase">${label}</p>
                                    <div class="flex items-end gap-2 mb-2">
                                        <span class="text-2xl font-black text-[#FF4500] leading-none">${val.toFixed(2)}</span>
                                        <span class="text-[10px] text-zinc-600 font-bold mb-0.5">/ 5.0</span>
                                    </div>
                                    <div class="w-full h-1 bg-zinc-900">
                                        <div class="result-bar h-full bg-[#FF4500]" style="width: 0%" data-width="${percent}%"></div>
                                    </div>
                                </div>`;
                        }).join('')}
                    </div>

                    <div class="bg-black border border-zinc-800 p-6 flex flex-col sm:flex-row justify-between gap-4">
                        <div class="text-[10px] text-zinc-600 font-mono">
                            <div>> UID: BF6-ALPHA-${Math.random().toString(36).substr(2, 9).toUpperCase()}</div>
                            <div>> SYSTEM: V2.55-PREVIEW</div>
                            <div>> TIMESTAMP: ${new Date().toISOString()}</div>
                        </div>
                        <div class="text-[10px] text-[#FF4500] font-black italic tracking-widest uppercase self-end">
                            End of Intelligence Report
                        </div>
                    </div>
                </div>`;

            document.getElementById('result-overlay').style.display = 'flex';
            setTimeout(() => { document.querySelectorAll('.result-bar').forEach(b => b.style.width = b.dataset.width); }, 100);
        }

        function closeResult() { document.getElementById('result-overlay').style.display = 'none'; }
        window.onload = render;
    </script>
</body>
</html>
